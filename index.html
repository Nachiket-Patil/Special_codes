<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will You Be My GF?</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        
        body {
            background-color: #99ffcc;
            color: #008b00;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            transition: background-color 0.5s ease;
            touch-action: manipulation;
        }
        
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }
        
        .page.active {
            display: flex;
        }
        
        .gif-container {
            width: 85vw;
            max-width: 280px;
            height: 85vw;
            max-height: 280px;
            margin-bottom: 5vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(139, 0, 0, 0.2);
            border: 8px solid white;
            position: relative;
            z-index: 1;
        }
        
        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        
        h1 {
            font-size: clamp(1.5rem, 5vw, 1.8rem);
            margin-bottom: 5vh;
            line-height: 1.4;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
            padding: 0 10px;
            font-weight: 700;
        }
        
        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 4vh;
            position: relative;
            min-height: 20vh;
        }
        
        .initial-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            z-index: 5;
            position: relative;
        }
        
        .btn {
            padding: 16px 32px;
            font-size: clamp(1.2rem, 4vw, 1.3rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            min-width: 120px;
            transform-origin: center center;
            -webkit-appearance: none;
            touch-action: manipulation;
            user-select: none;
        }
        
        .btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .yes-btn {
            background: linear-gradient(145deg, #5cb85c, #4CAF50);
            color: white;
            position: relative;
            z-index: 10;
            border: 2px solid #3d8b3d;
        }
        
        .no-btn {
            background: linear-gradient(145deg, #ff5555, #f44336);
            color: white;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 15;
            border: 2px solid #d32f2f;
        }
        
        .no-btn.floating {
            position: fixed !important;
            z-index: 100;
            touch-action: none;
        }
        
        .message {
            font-size: clamp(1.2rem, 4vw, 1.4rem);
            line-height: 1.6;
            margin-top: 4vh;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 90vw;
            max-width: 450px;
            backdrop-filter: blur(5px);
        }
        
        .emoji {
            font-size: clamp(1.8rem, 6vw, 2rem);
            margin: 0 5px;
        }
        
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .heart {
            position: absolute;
            font-size: clamp(16px, 4vw, 20px);
            color: #ff4081;
            opacity: 0.7;
            animation: float 5s infinite linear;
        }
        
        .page2 {
            background-color: #008b00;
        }
        
        .page3 {
            background-color: #008b00;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .pulse {
            animation: pulse 1.5s infinite;
        }
        
        .shake {
            animation: shake 0.5s ease;
        }
        
        /* Prevent text selection */
        .noselect {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* Mobile-specific adjustments */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                justify-content: flex-start;
                padding-top: 5vh;
            }
            
            .gif-container {
                width: 80vw;
                height: 80vw;
                margin-bottom: 4vh;
            }
            
            .btn {
                padding: 18px 24px;
                font-size: 1.1rem;
                min-width: 45vw;
                margin: 5px;
            }
            
            .initial-buttons {
                gap: 10px;
                flex-direction: row;
            }
            
            .message {
                padding: 15px;
                margin-top: 3vh;
            }
            
            h1 {
                margin-bottom: 4vh;
                font-size: 1.4rem;
            }
        }
        
        @media (max-height: 700px) {
            .gif-container {
                width: 70vw;
                height: 70vw;
                margin-bottom: 3vh;
            }
            
            h1 {
                margin-bottom: 3vh;
                font-size: 1.3rem;
            }
            
            .btn {
                padding: 14px 20px;
            }
        }
        
        /* Landscape mode */
        @media (orientation: landscape) and (max-height: 600px) {
            body {
                flex-direction: row;
                padding: 10px;
            }
            
            .page {
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                width: 100%;
            }
            
            .gif-container {
                width: 40vh;
                height: 40vh;
                margin-bottom: 0;
                margin-right: 20px;
            }
            
            .buttons-wrapper {
                width: 50%;
                margin-top: 0;
            }
            
            h1 {
                position: absolute;
                top: 10px;
                width: 100%;
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body class="noselect">
    <!-- Hearts background -->
    <div class="hearts" id="hearts"></div>
    
    <!-- Page 1: Question Page -->
    <div class="page active" id="page1">
        <div class="gif-container">
            <img src="main.gif" alt="Teddy Bear GIF">
        </div>
        <h1>RiЯii, will you be my GF?</h1>
        
        <!-- Buttons wrapper -->
        <div class="buttons-wrapper">
            <div class="initial-buttons">
                <button class="btn yes-btn" id="yesBtn">Yes</button>
                <button class="btn no-btn" id="noBtn">No</button>
            </div>
        </div>
    </div>
    
    <!-- Page 2: Yes Response Page -->
    <div class="page" id="page2">
        <div class="gif-container">
            <img src="yes.gif" alt="Happy Valentine GIF">
        </div>
        <h1>You really pressed, Yes <span class="emoji">😭</span> Thank You for accepting</h1>
        <div class="message pulse">
            Have a nice Day! This means the world to me. 
            <span class="emoji">💚</span>
        </div>
    </div>
    
    <!-- Page 3: No Response Page -->
    <div class="page" id="page3">
        <div class="gif-container">
            <img src="okay.gif" alt="Sad but understanding GIF">
        </div>
        <h1>Fine! Your Last No is accepted <span class="emoji">🙂</span></h1>
        <div class="message">
            Thank you for taking interest in this. My intention is never to force a Yes out of you. 
            At last, what matters to me is you are happy.
        </div>
    </div>

    <script>
        // DOM Elements
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const page3 = document.getElementById('page3');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const heartsContainer = document.getElementById('hearts');
        
        // Game variables
        let noClickCount = 0;
        const noButtonTexts = ["No", "Really, No!", "For Real, NO!", "Last No 🥺"];
        const yesButtonBaseSize = 1;
        let yesButtonSize = yesButtonBaseSize;
        let noButtonSize = 1;
        let isNoButtonFloating = false;
        let touchStartTime = 0;
        
        // Create floating hearts
        function createHearts() {
            const heartCount = Math.min(20, Math.floor(window.innerWidth / 20));
            
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '💚';
                
                // Random position and animation
                heart.style.left = `${Math.random() * 100}vw`;
                heart.style.fontSize = `${Math.random() * 15 + 15}px`;
                heart.style.animationDuration = `${Math.random() * 3 + 4}s`;
                heart.style.animationDelay = `${Math.random() * 2}s`;
                
                heartsContainer.appendChild(heart);
            }
        }
        
        // Get random position anywhere on screen (but not overlapping Yes button)
        function getRandomNonOverlapPosition() {
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            
            // Get button dimensions - use actual button size
            const buttonWidth = noBtn.offsetWidth || Math.min(140, viewportWidth * 0.3);
            const buttonHeight = noBtn.offsetHeight || 50;
            
            // Get Yes button position
            const yesBtnRect = yesBtn.getBoundingClientRect();
            
            // Buffer space between buttons
            const buffer = 20;
            
            let attempts = 0;
            const maxAttempts = 50;
            
            while (attempts < maxAttempts) {
                // Generate random position anywhere on screen
                const randomX = Math.max(10, Math.random() * (viewportWidth - buttonWidth - 20));
                const randomY = Math.max(10, Math.random() * (viewportHeight - buttonHeight - 20));
                
                // Check if this position overlaps with Yes button
                const yesLeft = yesBtnRect.left;
                const yesTop = yesBtnRect.top;
                const yesRight = yesBtnRect.right;
                const yesBottom = yesBtnRect.bottom;
                
                // Check for overlap with buffer
                const overlapX = (
                    randomX < yesRight + buffer &&
                    randomX + buttonWidth + buffer > yesLeft
                );
                
                const overlapY = (
                    randomY < yesBottom + buffer &&
                    randomY + buttonHeight + buffer > yesTop
                );
                
                // If no overlap, return this position
                if (!(overlapX && overlapY)) {
                    return { x: randomX, y: randomY };
                }
                
                attempts++;
            }
            
            // Fallback: positions around edges
            const edgePositions = [
                { x: 10, y: 10 }, // Top-left
                { x: viewportWidth - buttonWidth - 10, y: 10 }, // Top-right
                { x: 10, y: viewportHeight - buttonHeight - 10 }, // Bottom-left
                { x: viewportWidth - buttonWidth - 10, y: viewportHeight - buttonHeight - 10 } // Bottom-right
            ];
            
            return edgePositions[Math.floor(Math.random() * edgePositions.length)];
        }
        
        // Change page function
        function goToPage(pageNumber) {
            // Hide all pages
            page1.classList.remove('active');
            page2.classList.remove('active');
            page3.classList.remove('active');
            
            // Show the selected page
            if (pageNumber === 1) {
                page1.classList.add('active');
                document.body.style.backgroundColor = '#ffe6f2';
            } else if (pageNumber === 2) {
                page2.classList.add('active');
                document.body.style.backgroundColor = '#fff0f6';
                // Add more hearts for celebration
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.classList.add('heart');
                        heart.innerHTML = '💚';
                        heart.style.left = `${Math.random() * 100}vw`;
                        heart.style.fontSize = `${Math.random() * 20 + 20}px`;
                        heart.style.animationDuration = `${Math.random() * 2 + 3}s`;
                        heartsContainer.appendChild(heart);
                        
                        // Remove heart after animation
                        setTimeout(() => {
                            heart.remove();
                        }, 5000);
                    }, i * 100);
                }
            } else if (pageNumber === 3) {
                page3.classList.add('active');
                document.body.style.backgroundColor = '#f0f8ff';
            }
        }
        
        // Initialize floating button behavior
        function makeNoButtonFloat() {
            isNoButtonFloating = true;
            
            // Change No button to fixed positioning
            noBtn.classList.add('floating');
            
            // Remove from initial buttons container visually
            noBtn.style.position = 'fixed';
            
            // Set initial random position
            const initialPos = getRandomNonOverlapPosition();
            noBtn.style.left = `${initialPos.x}px`;
            noBtn.style.top = `${initialPos.y}px`;
            noBtn.style.zIndex = '1000';
            
            // Make sure it's visible and clickable
            noBtn.style.opacity = '1';
            noBtn.style.pointerEvents = 'auto';
        }
        
        // Handle button click with proper touch/click detection
        function handleYesButton() {
            goToPage(2);
        }
        
        function handleNoButton() {
            noClickCount++;
            
            if (noClickCount <= 4) {
                // First click: start floating behavior
                if (noClickCount === 1) {
                    makeNoButtonFloat();
                }
                
                // Change button text
                if (noClickCount <= 3) {
                    noBtn.textContent = noButtonTexts[noClickCount];
                } else {
                    // Fourth click is "Last No" - go to page 3 immediately
                    // noBtn.style.display = "none";
                     goToPage(3);
                    return;
                }
                
                // Increase yes button size by 20% each time (starts from same size)
                yesButtonSize += 0.2;
                yesBtn.style.transform = `scale(${yesButtonSize})`;
                
                // Decrease no button size by 20% each time
                noButtonSize *= 0.8;
                noBtn.style.transform = `scale(${noButtonSize})`;
                
                // Move no button to random non-overlapping position
                const newPos = getRandomNonOverlapPosition();
                noBtn.style.left = `${newPos.x}px`;
                noBtn.style.top = `${newPos.y}px`;
                
                // Add a shake effect for fun
                noBtn.classList.add('shake');
                setTimeout(() => {
                    noBtn.classList.remove('shake');
                }, 500);
                
                // Ensure button remains clickable
                setTimeout(() => {
                    noBtn.style.pointerEvents = 'auto';
                }, 100);
            }
        }
        
        // Setup event listeners for both touch and click
        function setupEventListeners() {
            // Yes button - use both touch and click
            yesBtn.addEventListener('click', handleYesButton);
            yesBtn.addEventListener('touchstart', function(e) {
                touchStartTime = Date.now();
                this.style.transform = 'scale(0.95)';
                e.preventDefault();
            });
            yesBtn.addEventListener('touchend', function(e) {
                const touchDuration = Date.now() - touchStartTime;
                if (touchDuration < 500) { // Only register as click if touch was brief
                    handleYesButton();
                }
                this.style.transform = `scale(${yesButtonSize})`;
                e.preventDefault();
            });
            
            // No button - use both touch and click
            noBtn.addEventListener('click', handleNoButton);
            noBtn.addEventListener('touchstart', function(e) {
                touchStartTime = Date.now();
                this.style.transform = `scale(${noButtonSize * 0.95})`;
                e.preventDefault();
            });
            noBtn.addEventListener('touchend', function(e) {
                const touchDuration = Date.now() - touchStartTime;
                if (touchDuration < 500) { // Only register as click if touch was brief
                    handleNoButton();
                }
                this.style.transform = `scale(${noButtonSize})`;
                e.preventDefault();
            });
        }
        
        // Handle window resize to keep floating button on screen
        function handleResize() {
            if (isNoButtonFloating && noClickCount < 4) {
                const newPos = getRandomNonOverlapPosition();
                noBtn.style.left = `${newPos.x}px`;
                noBtn.style.top = `${newPos.y}px`;
            }
            
            // Recreate hearts for new screen size
            heartsContainer.innerHTML = '';
            createHearts();
        }
        
        // Prevent context menu on long press
        document.addEventListener('contextmenu', function(e) {
            if (e.target.classList.contains('btn')) {
                e.preventDefault();
            }
        });
        
        // Initialize the page
        function init() {
            createHearts();
            setupEventListeners();
            
            // Set initial styles for both buttons
            yesBtn.style.transform = `scale(${yesButtonSize})`;
            noBtn.style.transform = `scale(${noButtonSize})`;
            
            // Remove any floating styles on init
            noBtn.classList.remove('floating');
            noBtn.style.position = '';
            noBtn.style.left = '';
            noBtn.style.top = '';
            noBtn.style.zIndex = '';
        }
        
        // Start when page loads
        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', function() {
            setTimeout(handleResize, 100);
        });
        
        // Prevent unwanted scrolling
        document.addEventListener('touchmove', function(e) {
            if (e.target.classList.contains('no-btn') && isNoButtonFloating) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>

</html>
